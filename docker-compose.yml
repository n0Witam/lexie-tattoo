version: "3.8"

services:
  web:
    image: nginx:alpine
    container_name: lexie-tattoo
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
